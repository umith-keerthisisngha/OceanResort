name: Ocean Resort CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Compile all Java source files
      - name: Compile Java source
        run: |
          mkdir -p bin
          javac -cp "mysql-connector-j-9.6.0/*" -d bin src/resort/*.java
        continue-on-error: true

      # 4. Confirm build output
      - name: Verify compiled classes
        run: |
          echo "=== Compiled Classes ==="
          ls bin/resort/ || echo "No classes found"

      # 5. Run JUnit 5 tests (if test runner jar is present)
      - name: Run JUnit Tests
        run: |
          if [ -f "junit-platform-console-standalone.jar" ]; then
            java -jar junit-platform-console-standalone.jar \
              --class-path bin \
              --scan-class-path \
              --reports-dir=test-results
          else
            echo "JUnit runner not found — skipping test execution"
            echo "Add junit-platform-console-standalone.jar to repo root to enable"
          fi
        continue-on-error: true

      # 6. Upload test results as artifact
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-results/
